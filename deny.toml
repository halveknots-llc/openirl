[advisories]
ignore = []

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
# OpenIRL is distributed as a public source workspace for the alpha package.
# Workspace-local path dependencies are expected until individual crates are
# prepared for crates.io publication.
wildcards = "allow"
allow-wildcard-paths = true
skip = [
  { crate = "getrandom@0.3.4", reason = "transitive split between tungstenite/rand and uuid until upstream dependency lines converge" },
  { crate = "r-efi@5.3.0", reason = "transitive getrandom platform dependency tied to the same temporary split" },
  { crate = "wit-bindgen@0.46.0", reason = "transitive WASI dependency tied to the same temporary split" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
